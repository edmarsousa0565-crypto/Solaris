<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo principal -->
  <rect width="1200" height="630" fill="#FAF5EF"/>

  <!-- Painel preto direito -->
  <rect x="750" y="0" width="450" height="630" fill="#1C1410"/>

  <!-- Linha amarela inferior -->
  <rect x="0" y="624" width="750" height="6" fill="#F4A623"/>

  <!-- Linha decorativa superior esquerda -->
  <rect x="80" y="80" width="200" height="0.5" fill="#1C1410" opacity="0.2"/>

  <!-- Label Verao 2025 -->
  <text x="80" y="230" font-family="Georgia, serif" font-size="13" letter-spacing="8" text-transform="uppercase" fill="#F4A623">VERAO 2025</text>

  <!-- Titulo SOLARIS grande -->
  <text x="80" y="340" font-family="Georgia, serif" font-size="110" font-weight="300" fill="#1C1410" letter-spacing="-2">SOLARIS</text>

  <!-- Subtitulo -->
  <text x="80" y="395" font-family="Courier New, monospace" font-size="16" letter-spacing="5" fill="#1C1410" opacity="0.5">MODA FEMININA — PORTUGAL</text>

  <!-- Botao CTA -->
  <rect x="80" y="430" width="200" height="50" fill="#F4A623"/>
  <text x="180" y="461" font-family="Courier New, monospace" font-size="13" letter-spacing="3" text-anchor="middle" fill="#1C1410">VER COLECAO →</text>

  <!-- URL -->
  <text x="305" y="461" font-family="Courier New, monospace" font-size="12" letter-spacing="2" fill="#1C1410" opacity="0.35">solaris-drab.vercel.app</text>

  <!-- Logo sobre fundo preto -->
  <text x="900" y="120" font-family="Georgia, serif" font-size="18" letter-spacing="10" text-anchor="middle" fill="#FAF5EF" opacity="0.4">SOLARIS</text>

  <!-- S decorativo grande -->
  <text x="870" y="600" font-family="Georgia, serif" font-size="400" font-weight="300" fill="#FAF5EF" opacity="0.05">S</text>

  <!-- Linha decorativa no painel preto -->
  <rect x="820" y="200" width="60" height="0.5" fill="#FAF5EF" opacity="0.2"/>

  <!-- Texto lateral no painel preto -->
  <text x="975" y="320" font-family="Georgia, serif" font-size="13" letter-spacing="4" text-anchor="middle" fill="#FAF5EF" opacity="0.3">ARCHITECTURE</text>
  <text x="975" y="345" font-family="Georgia, serif" font-size="13" letter-spacing="4" text-anchor="middle" fill="#FAF5EF" opacity="0.3">OF LIGHT</text>
</svg>
